name: test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: Repository smoke check
        run: |
          test -f README.md
          test -f go.mod
          test -d cmd
      - name: Run Go tests
        run: |
          go test ./...
